# A solution is a collection of related projects that share same base configuration.
solution:
  created-for: CMSIS-Toolbox@2.13.0
  cdefault: # use CMSIS-Toolbox default Compiler options

  # Compilers that can be selected
  select-compiler:
    - compiler: AC6
    - compiler: GCC
    - compiler: IAR
    - compiler: CLANG

  # List of miscellaneous tool-specific controls
  misc:
    - for-compiler: AC6
      C-CPP:
        - -Wno-macro-redefined
        - -Wno-pragma-pack
        - -Wno-parentheses-equality
        - -Wno-license-management
      C:
        - -std=gnu11
      ASM:
        - -masm=auto
      Link:
        - --entry=Reset_Handler
        - --info=summarysizes
        - --summary_stderr
        - --diag_suppress=L6314W

    - for-compiler: GCC
      C-CPP:
        - -masm-syntax-unified
        - -fomit-frame-pointer
        - -ffunction-sections
        - -fdata-sections
      C:
        - -std=gnu11
      Link:
        - --specs=nano.specs
        - --specs=nosys.specs
        - -Wl,-print-memory-usage
        - -Wl,--gc-sections
        - -Wl,--no-warn-rwx-segments

    - for-compiler: CLANG
      C-CPP:
        - -fomit-frame-pointer
        - -ffunction-sections
        - -fdata-sections
      C:
        - -std=gnu11
      Link:
        - -Wl,-print-memory-usage
        - -Wl,--gc-sections

    - for-compiler: IAR
      C-CPP:
        - -e
        - --dlib_config DLib_Config_Full.h

  # List the packs that define the device and/or board.
  packs:
    - pack: Microchip::PIC32CM-JH_DFP
    - pack: ARM::CMSIS
    - pack: ARM::CMSIS-Compiler
    - pack: Microchip::CMSIS-Driver_PIC32CM-JH
    - pack: Microchip::PIC32CM-JH_Examples
    - pack: ARM::CMSIS-FreeRTOS

  # List different hardware targets that are used to deploy the solution.
  target-types:
    - type: PIC32CM5164JH01048
      device: PIC32CM5164JH01048
      target-set:
        - set: index_0
          images:
            - project-context: CNANO_MCHP_WaveGen_Example.Debug
          debugger:
            name: CMSIS-DAP@pyOCD
            clock: 1000000
            protocol: swd

  # List of different build configurations.
  build-types:
    - type: Debug
      debug: on
      optimize: none

    - type: Release
      debug: off
      optimize: balanced

  # List related projects.
  projects:
    - project: CNANO_MCHP_WaveGen_Example.cproject.yml

  compiler: AC6
